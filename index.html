<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veilles — Office Plus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Raleway', sans-serif; background: #f4f6f9; color: #1a1a2e; }
    header { background: #1a1a2e; color: #fff; padding: 2rem 3rem; border-bottom: 4px solid #e8a020; }
    header h1 { font-size: 1.6rem; font-weight: 700; }
    header p { margin-top: 0.4rem; font-size: 0.9rem; opacity: 0.7; }
    main { max-width: 960px; margin: 2rem auto; padding: 0 1.5rem; }
    .note { background: #fff; border-radius: 6px; margin-bottom: 2rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .note-header { background: #1a1a2e; color: #fff; padding: 1.2rem 2rem; border-radius: 6px 6px 0 0; }
    .note-header h2 { font-size: 1.1rem; font-weight: 700; margin-top: 0.5rem; }
    .note-meta { display: flex; gap: 1rem; font-size: 0.85rem; opacity: 0.85; flex-wrap: wrap; }
    .badge { display: inline-block; padding: 0.2rem 0.7rem; border-radius: 3px; font-size: 0.78rem; font-weight: 700; }
    .badge-marche { background: #e8a020; color: #fff; }
    .badge-tech { background: #1a6abf; color: #fff; }
    .note-body { padding: 1.5rem 2rem; }
    .note-body section { margin-bottom: 1.2rem; }
    .note-body h3 { font-size: 0.95rem; font-weight: 700; border-left: 4px solid #e8a020; padding-left: 0.6rem; margin-bottom: 0.7rem; }
    .note-body p, .note-body li { font-size: 0.92rem; line-height: 1.7; }
    .note-body ul { padding-left: 1.2rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th { background: #1a1a2e; color: #fff; padding: 0.5rem 0.8rem; text-align: left; }
    td { padding: 0.45rem 0.8rem; border-bottom: 1px solid #eee; }
    td a { color: #1a6abf; }
    .alerte { background: #fff8e1; border-radius: 4px; padding: 0.8rem 1rem; }
    .opportunite { background: #f0f7ff; border-radius: 4px; padding: 0.8rem 1rem; }
    .confiance { margin-top: 1rem; font-size: 0.9rem; color: #555; font-style: italic; }
    .empty-state { text-align: center; padding: 4rem 2rem; color: #999; font-size: 0.95rem; }
    footer { text-align: center; font-size: 0.8rem; color: #999; padding: 2rem; }
  </style>
</head>
<body>
  <header>
    <h1>Veilles marché et technologique — Office Plus</h1>
    <p>Nouvelle-Calédonie · Notes les plus récentes en tête</p>
  </header>
  <main>
    <!-- NOTES -->
    <div class="empty-state">Aucune note de veille publiée pour le moment.</div>
  </main>
  <footer>Office Plus SARL — Veille marché et technologique</footer>
</body>
</html>
